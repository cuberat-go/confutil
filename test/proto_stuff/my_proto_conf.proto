syntax = "proto3";

package my_proto_conf;

option go_package = "github.com/cuberat-go/confutil/test/proto_stuff/my_proto_conf";

message MyProtoConf {
	string field1 = 1;
	int32 field2 = 2;
}

message ProtoWithOneof {
	string top_field = 1;
	oneof test_oneof {
		string field1 = 2;
		int32 field2 = 3;
	}
}
